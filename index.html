<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Level Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue2:#1d4ed8;--blue-light:#eff6ff;
  --green:#16a34a;--green2:#15803d;--green-light:#f0fdf4;
  --red:#dc2626;--red2:#b91c1c;--red-light:#fef2f2;
  --gold:#f59e0b;--purple:#7c3aed;--purple-light:#f5f3ff;
  --orange:#ea580c;
  --gray:#6b7280;--gray-light:#f9fafb;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;--white:#fff;
  --r2:14px;
  --fc:'Roboto',sans-serif;
  --fl:'Inter',sans-serif;
}
/* Кириллица → Nunito, латын → Inter */
body{font-family:var(--fc);background:#0f172a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;overflow-x:hidden;}
/* Latin text elements use Inter */
.q-text,.opt,.fill-inp,.wchip,.pchip,.fb-body,.q-hint{font-family:var(--fl);}
/* Cyrillic UI elements use Nunito */
.reg-title,.reg-sub,.btn,.badge,.prog-label,.lvl-pill,.res-name,.res-desc,.res-of,.fb-title,.inp-field,.inp-hint,.err-msg,.res-score{font-family:var(--fc);}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{background:var(--white);width:100%;max-width:480px;border-radius:28px;padding:0;box-shadow:0 24px 80px rgba(0,0,0,.4);position:relative;overflow:hidden;z-index:1;}
.app-top-bar{height:5px;background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899);border-radius:28px 28px 0 0;}
.app-inner{padding:28px 24px 24px;}
.screen{display:none;animation:fadeUp .4s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
@keyframes logoIn{from{opacity:0;transform:scale(.4) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.logo-glow{width:130px;height:16px;margin:0 auto 4px;background:radial-gradient(ellipse,rgba(37,99,235,.25) 0%,transparent 70%);border-radius:50%;animation:glowPulse 3s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scaleX(.8)}50%{opacity:1;transform:scaleX(1.1)}}
.logo-wrap{text-align:center;margin-bottom:20px;}
.logo-img{width:130px;height:130px;object-fit:contain;border-radius:24px;display:block;margin:0 auto;animation:logoFloat 3s ease-in-out infinite,logoIn .6s cubic-bezier(.32,2,.6,1) both;}
.logo-placeholder{width:130px;height:130px;border-radius:20px;background:var(--blue-light);border:2px dashed #93c5fd;display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:12px;color:var(--blue);font-weight:700;text-align:center;padding:10px;}
.reg-title{font-size:24px;font-weight:900;color:var(--text);text-align:center;line-height:1.3;margin-bottom:6px;}
.reg-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;font-weight:600;}
.badge-row{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-purple{background:var(--purple-light);color:var(--purple);}
.badge-green{background:#f0fdf4;color:var(--green);}
.inp-group{position:relative;margin-bottom:12px;}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.inp-field{width:100%;padding:14px 16px 14px 46px;border:2px solid var(--border);border-radius:var(--r2);font-size:15px;font-family:var(--fc);font-weight:600;outline:none;transition:border .2s,box-shadow .2s;color:var(--text);}
.inp-field:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1);}
.inp-field.err{border-color:var(--red);animation:shake .4s;}
.inp-hint{font-size:12px;color:var(--muted);margin-top:4px;margin-left:4px;font-weight:600;}
.err-msg{color:var(--red);display:none;font-size:12px;margin-top:4px;margin-left:4px;font-weight:600;}
.err-msg.show{display:block;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:var(--r2);font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.3px;font-family:var(--fc);}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue2);}
.btn-blue:hover{background:var(--blue2);}
.btn-blue:active{transform:translateY(4px);box-shadow:none;}
.btn-ghost{background:var(--gray-light);color:var(--gray);border:2px solid var(--border);}
.btn-ghost:hover{background:var(--border);}
.prog-wrap{margin-bottom:20px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:13px;font-weight:700;color:var(--muted);}
.hearts-row{display:flex;gap:4px;}
.heart{font-size:20px;transition:all .4s;display:inline-block;}
.heart.lost{filter:grayscale(1);opacity:.25;transform:scale(.8);}
.prog-bar{height:12px;background:var(--border);border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:8px;transition:width .5s cubic-bezier(.4,2,.6,1);}
.q-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--fl);}
.q-text{font-size:19px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.4;}
.q-hint{font-size:13px;color:var(--muted);margin-bottom:20px;font-weight:600;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{width:100%;padding:14px 18px;text-align:left;background:var(--white);border:2.5px solid var(--border);border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text);}
.opt:hover{border-color:var(--blue);transform:translateX(4px);}
.opt.correct{border-color:var(--green);background:#f0fdf4;color:var(--green2);pointer-events:none;animation:correctAnim .5s ease;}
.opt.wrong{border-color:var(--red);background:#fef2f2;color:var(--red2);pointer-events:none;animation:shake .4s;}
.opt.disabled{pointer-events:none;opacity:.4;}
@keyframes correctAnim{0%{transform:scale(.97)}50%{transform:scale(1.02)}100%{transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
.fill-inp{width:100%;padding:14px 16px;border:2.5px solid var(--border);border-radius:var(--r2);font-size:15px;font-weight:700;outline:none;transition:all .2s;margin-bottom:12px;}
.fill-inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1);}
.fill-inp.correct{border-color:var(--green);background:#f0fdf4;}
.fill-inp.wrong{border-color:var(--red);background:#fef2f2;animation:shake .4s;}
.ans-zone{min-height:56px;border:2.5px dashed var(--border);border-radius:var(--r2);padding:10px 12px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;background:var(--blue-light);align-items:center;transition:all .3s;}
.ans-zone.correct{border-color:var(--green);background:#f0fdf4;}
.ans-zone.wrong{border-color:var(--red);background:#fef2f2;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;}
.wchip{padding:8px 13px;background:var(--white);border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:800;color:var(--text);transition:all .15s;user-select:none;}
.wchip:hover{border-color:var(--blue);background:var(--blue-light);transform:scale(1.06);}
.wchip.gone{display:none;}
.pchip{padding:6px 11px;background:var(--blue);color:#fff;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;}
.pchip:hover{background:var(--red);}
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;}
.fb-overlay.show{opacity:1;pointer-events:all;}
.fb-card{background:var(--white);border-radius:28px 28px 0 0;padding:28px 24px 36px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,1.8,.7,1);}
.fb-overlay.show .fb-card{transform:translateY(0);}
.fb-icon-wrap{font-size:52px;text-align:center;margin-bottom:12px;display:block;animation:iconPop .5s cubic-bezier(.32,2,.7,1);}
@keyframes iconPop{from{transform:scale(0)}to{transform:scale(1)}}
.fb-bar{height:5px;width:60px;border-radius:4px;margin:0 auto 20px;}
.fb-title{font-size:20px;font-weight:900;text-align:center;margin-bottom:8px;}
.fb-body{font-size:13px;color:var(--muted);text-align:center;margin-bottom:22px;line-height:1.6;font-weight:600;}
.res-hero{text-align:center;padding:8px 0 16px;}
.res-ring{width:120px;height:120px;margin:0 auto 16px;position:relative;display:flex;align-items:center;justify-content:center;}
.res-ring svg{position:absolute;inset:0;animation:spin 4s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.res-emoji{font-size:52px;position:relative;z-index:1;}
.res-score{font-size:48px;font-weight:900;color:var(--text);}
.res-of{font-size:15px;color:var(--muted);margin-bottom:6px;font-weight:700;}
.lvl-pill{display:inline-block;padding:8px 24px;border-radius:20px;font-size:13px;font-weight:800;margin-bottom:10px;}
.res-name{font-size:19px;font-weight:900;color:var(--text);margin-bottom:6px;}
.res-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;font-weight:600;}
.res-info{background:var(--gray-light);border-radius:14px;padding:14px 16px;margin-bottom:16px;text-align:left;}
.res-info-item{font-size:13px;color:var(--text);font-weight:600;padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.res-info-item:last-child{border-bottom:none;}
.res-info-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding:0 2px;}
.streak{display:flex;justify-content:center;gap:5px;margin-bottom:16px;}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--border);}
.sdot.ok{background:var(--gold);}
.sdot.wr{background:#fca5a5;}
.btn-wa{background:#25d366;color:#fff;box-shadow:0 4px 0 #1da851;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;border-radius:var(--r2);padding:15px;font-size:15px;font-weight:800;font-family:var(--fc);cursor:pointer;margin-bottom:10px;transition:all .15s;border:none;width:100%;}
.btn-wa:active{transform:translateY(4px);box-shadow:none;}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.cp{position:absolute;border-radius:3px;animation:fall linear forwards;}
@keyframes fall{from{opacity:1}to{transform:translateY(105vh) rotate(720deg);opacity:0}}
.particle{position:fixed;pointer-events:none;z-index:998;border-radius:50%;animation:partExplode .6s ease-out forwards;}
@keyframes partExplode{from{opacity:1;transform:scale(0)}to{opacity:0;transform:scale(1) translate(var(--tx),var(--ty));}}
</style>
</head>

<script>
var WA_NUMBER = '77477520784'; 
var GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbzeDIFMbkxuAf8n1lxXgIuSeHBZnWiLjYBgMx4U4wgbN987Z2bPXtVgHzniSVMGUJLPgw/exec';

/* ── CANVAS BG ── */
(function(){
  var cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
  var W,H,shapes=[],lines=[];
  var C=['#3b82f6','#8b5cf6','#ec4899','#06b6d4','#10b981','#f59e0b'];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  for(var i=0;i<16;i++) shapes.push({x:Math.random()*W,y:Math.random()*H,r:12+Math.random()*38,type:i%3,color:C[i%C.length],alpha:.05+Math.random()*.1,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,rot:Math.random()*6.28,vrot:(Math.random()-.5)*.008,stroke:i%2===0});
  for(var j=0;j<14;j++) lines.push({x1:Math.random()*W,y1:Math.random()*H,x2:Math.random()*W,y2:Math.random()*H,color:C[j%C.length],alpha:.03+Math.random()*.07,vx1:(Math.random()-.5)*.4,vy1:(Math.random()-.5)*.4,vx2:(Math.random()-.5)*.4,vy2:(Math.random()-.5)*.4});
  function draw(s){
    ctx.save();ctx.globalAlpha=s.alpha;ctx.strokeStyle=s.color;ctx.fillStyle=s.color;ctx.lineWidth=1.5;
    ctx.translate(s.x,s.y);ctx.rotate(s.rot);
    ctx.beginPath();
    if(s.type===0){ctx.arc(0,0,s.r,0,6.28);}
    else if(s.type===1){ctx.moveTo(0,-s.r);ctx.lineTo(s.r*.87,s.r*.5);ctx.lineTo(-s.r*.87,s.r*.5);ctx.closePath();}
    else{var h=s.r*.7;ctx.rect(-h,-h,h*2,h*2);}
    if(s.stroke)ctx.stroke();else ctx.fill();
    ctx.restore();
  }
  function tick(){
    ctx.clearRect(0,0,W,H);
    lines.forEach(function(l){
      ctx.save();ctx.globalAlpha=l.alpha;ctx.strokeStyle=l.color;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();ctx.restore();
      l.x1+=l.vx1;l.y1+=l.vy1;l.x2+=l.vx2;l.y2+=l.vy2;
      if(l.x1<0||l.x1>W)l.vx1*=-1;if(l.y1<0||l.y1>H)l.vy1*=-1;
      if(l.x2<0||l.x2>W)l.vx2*=-1;if(l.y2<0||l.y2>H)l.vy2*=-1;
    });
    shapes.forEach(function(s){
      draw(s);s.x+=s.vx;s.y+=s.vy;s.rot+=s.vrot;
      if(s.x<-s.r)s.x=W+s.r;if(s.x>W+s.r)s.x=-s.r;
      if(s.y<-s.r)s.y=H+s.r;if(s.y>H+s.r)s.y=-s.r;
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

/* ── PHONE MASK ── */
document.getElementById('inp-phone').addEventListener('input',function(){
  var d=this.value.replace(/\D/g,'');
  if(!d.length){this.value='';return;}
  if(d[0]==='8')d='7'+d.slice(1);
  if(d[0]!=='7')d='7'+d;
  d=d.slice(0,11);
  var f='+7';
  if(d.length>1)f+=' ('+d.slice(1,4);
  if(d.length>=4)f+=') '+d.slice(4,7);
  if(d.length>=7)f+='-'+d.slice(7,9);
  if(d.length>=9)f+='-'+d.slice(9,11);
  this.value=f;
});
function validPhone(v){return v.replace(/\D/g,'').length===11;}

/* ── AUDIO ── */
var aC;
function ga(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();return aC;}
function tone(f,d,t,v){t=t||'sine';v=v||.28;try{var c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sOk(){tone(523,.1);setTimeout(function(){tone(659,.1);},100);setTimeout(function(){tone(784,.18);},200);}
function sBad(){tone(200,.12,'sawtooth',.18);setTimeout(function(){tone(150,.2,'sawtooth',.18);},100);}
function sClick(){tone(440,.04,'sine',.12);}
function sDone(){[523,659,784,1047].forEach(function(n,i){setTimeout(function(){tone(n,.18);},i*110);});}

/* ── QUESTIONS ── */
var Q=[
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Beginner',q:'She ___ coffee every morning.',h:'💭 Present Simple',opts:['drink','drinks','drinking','drinked'],a:'drinks',ex:'He/She/It-тен кейін "s/es" қосылады.'},
  {type:'choice',cat:'vocab',cc:'#16a34a',cb:'#f0fdf4',lv:'Beginner',q:'What is the opposite of "hot"?',h:'💭 Антоним табыңыз',opts:['warm','cold','big','fast'],a:'cold',ex:'"Hot" — ыстық, "cold" — суық.'},
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Beginner',q:'There ___ a cat and two dogs in the garden.',h:'💭 There is / are',opts:['is','are','am','be'],a:'is',ex:'"There is" — жекеше зат есімнен кейін.'},
  {type:'anagram',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Beginner',q:'Сөйлем құрастырыңыз:',h:'💭 Дұрыс ретпен орналастырыңыз',words:['are','we','friends','best'],a:'we are best friends',ex:'Subject + Verb + Complement.'},
  {type:'fill',cat:'vocab',cc:'#16a34a',cb:'#f0fdf4',lv:'Beginner',q:'Complete: "I ___ happy today." (болу)',h:'💭 "болу" — I-мен',a:'am',ex:'"am" тек "I"-мен қолданылады.'},
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Elementary',q:'I ___ watching TV when she called.',h:'💭 Past Continuous',opts:['was','were','am','have been'],a:'was',ex:'"was/were + Ving". I — was.'},
  {type:'choice',cat:'vocab',cc:'#16a34a',cb:'#f0fdf4',lv:'Elementary',q:'Choose the correct meaning of "exhausted":',h:'💭 "Tired"-дан да күшті',opts:['very happy','very tired','very hungry','very angry'],a:'very tired',ex:'"Exhausted" = өте шаршаған.'},
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Intermediate',q:'If I ___ you, I would apologize immediately.',h:'💭 2nd Conditional',opts:['am','was','were','have been'],a:'were',ex:'"If I were you..." — were барлық жекешеде.'},
  {type:'choice',cat:'vocab',cc:'#16a34a',cb:'#f0fdf4',lv:'Intermediate',q:'The project was ___ due to lack of funding.',h:'💭 Phrasal verb',opts:['called off','called up','called in','called out'],a:'called off',ex:'"Call off" — болдырмау, тоқтату.'},
  {type:'anagram',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Intermediate',q:'Сөйлем құрастырыңыз (Passive):',h:'💭 Passive Voice',words:['was','The','letter','by','written','her'],a:'The letter was written by her',ex:'Subject + was/were + V3 + by + Agent.'},
  {type:'choice',cat:'idiom',cc:'#ea580c',cb:'#fff7ed',lv:'Upper-Int.',q:'"It\'s raining cats and dogs outside." What does this mean?',h:'💭 Weather idiom',opts:['Animals are falling','It is raining lightly','It is raining very heavily','It is very windy'],a:'It is raining very heavily',ex:'"Raining cats and dogs" — өте қатты жауып тұр деген идиома.'},
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Upper-Int.',q:'By the time she arrives, I ___ the report.',h:'💭 Future Perfect',opts:['finish','will finish','will have finished','have finished'],a:'will have finished',ex:'"will have + V3".'},
  {type:'choice',cat:'vocab',cc:'#16a34a',cb:'#f0fdf4',lv:'Advanced',q:'The policy was met with widespread ___ from the public.',h:'💭 Formal vocabulary',opts:['approbation','opprobrium','ambivalence','acquiescence'],a:'opprobrium',ex:'"Opprobrium" — ашық жазғыру.'},
  {type:'choice',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Advanced',q:'___ he studied harder, he might have passed.',h:'💭 3rd Conditional inversion',opts:['If','Had','Would','Should'],a:'Had',ex:'"Had he studied..." = "If he had studied..."'},
  {type:'anagram',cat:'grammar',cc:'#2563eb',cb:'#eff6ff',lv:'Advanced',q:'Сөйлем құрастырыңыз (Advanced):',h:'💭 Subjunctive mood — күрделі конструкция',words:['he','insisted','that','be','she','present'],a:'he insisted that she be present',ex:'Subjunctive mood: "insist/suggest/demand + that + subject + bare infinitive" — ресми ағылшын грамматикасы.'}
];

var uName='',uPhone='',score=0,idx=0,hearts=3,ans=[];

function startTest(){
  uName=document.getElementById('inp-name').value.trim();
  uPhone=document.getElementById('inp-phone').value.trim();
  var nOk=uName.length>0, pOk=validPhone(uPhone);
  if(!nOk){var n=document.getElementById('inp-name');n.classList.add('err');setTimeout(function(){n.classList.remove('err');},600);}
  if(!pOk){
    var p=document.getElementById('inp-phone');p.classList.add('err');
    var e=document.getElementById('phone-err');e.classList.add('show');
    setTimeout(function(){p.classList.remove('err');e.classList.remove('show');},3000);
  }
  if(!nOk||!pOk)return;
  sClick();showScreen('quiz');
  score=0;idx=0;hearts=3;ans=[];
  renderH();loadQ();
}

function renderH(){
  var h=document.getElementById('hearts');h.innerHTML='';
  for(var i=0;i<3;i++){var d=document.createElement('div');d.className='heart'+(i>=hearts?' lost':'');d.textContent='❤️';h.appendChild(d);}
}

function loadQ(){
  var q=Q[idx];
  document.getElementById('q-ctr').textContent=(idx+1)+' / 15';
  document.getElementById('prog-fill').style.width=((idx/15)*100)+'%';
  var b=document.getElementById('q-badge');
  b.textContent='📝 '+q.cat.toUpperCase()+' · '+q.lv;
  b.style.background=q.cb;b.style.color=q.cc;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent=q.h;
  var body=document.getElementById('q-body');body.innerHTML='';
  if(q.type==='choice')rChoice(q,body);
  else if(q.type==='fill')rFill(q,body);
  else rAnagram(q,body);
}

function rChoice(q,body){
  var g=document.createElement('div');g.className='opts';
  q.opts.forEach(function(opt){
    var b=document.createElement('button');b.className='opt';b.textContent=opt;
    b.onclick=function(e){
      sClick();
      var ok=opt.toLowerCase()===q.a.toLowerCase();
      b.classList.add(ok?'correct':'wrong');
      g.querySelectorAll('.opt').forEach(function(x){if(x!==b)x.classList.add('disabled');});
      if(!ok){hearts--;renderH();sBad();spPart(e.clientX,e.clientY,'#dc2626');
        g.querySelectorAll('.opt').forEach(function(x){if(x.textContent.toLowerCase()===q.a.toLowerCase())x.classList.add('correct');});
      }else{sOk();spPart(e.clientX,e.clientY,'#16a34a');}
      hRes(ok,q);
    };
    g.appendChild(b);
  });
  body.appendChild(g);
}

function rFill(q,body){
  var inp=document.createElement('input');inp.className='fill-inp';inp.placeholder='Жауап жазыңыз...';inp.type='text';inp.autocomplete='off';
  body.appendChild(inp);
  var btn=document.createElement('button');btn.className='btn btn-blue';btn.textContent='ТЕКСЕРУ ✓';
  btn.onclick=function(){
    var ok=inp.value.trim().toLowerCase()===q.a.toLowerCase();
    inp.classList.add(ok?'correct':'wrong');inp.disabled=true;btn.disabled=true;
    if(!ok){hearts--;renderH();sBad();}else sOk();
    hRes(ok,q);
  };
  body.appendChild(btn);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
}

function rAnagram(q,body){
  var placed=[],chipEl={};
  var az=document.createElement('div');az.className='ans-zone';
  az.innerHTML='<span style="color:var(--muted);font-size:12px;font-weight:600;">Сөздерді мұнда орналастырыңыз...</span>';
  var bank=document.createElement('div');bank.className='word-bank';
  q.words.slice().sort(function(){return Math.random()-.5;}).forEach(function(w,i){
    var chip=document.createElement('div');chip.className='wchip';chip.textContent=w;
    var key=w+'_'+i;chipEl[key]=chip;
    chip.onclick=function(){
      sClick();
      if(az.querySelector('span'))az.innerHTML='';
      placed.push({w:w,key:key});chip.classList.add('gone');
      var pc=document.createElement('div');pc.className='pchip';pc.textContent=w;
      pc.onclick=function(){
        sClick();
        var ix=placed.findIndex(function(p){return p.key===key;});
        if(ix>-1)placed.splice(ix,1);
        pc.remove();chip.classList.remove('gone');
        if(!placed.length)az.innerHTML='<span style="color:var(--muted);font-size:12px;font-weight:600;">Сөздерді мұнда орналастырыңыз...</span>';
      };
      az.appendChild(pc);
      if(placed.length===q.words.length){
        var ok=placed.map(function(p){return p.w;}).join(' ').toLowerCase()===q.a.toLowerCase();
        az.classList.add(ok?'correct':'wrong');
        bank.querySelectorAll('.wchip').forEach(function(c){c.style.pointerEvents='none';});
        if(!ok){hearts--;renderH();sBad();}else sOk();
        setTimeout(function(){hRes(ok,q);},300);
      }
    };
    bank.appendChild(chip);
  });
  body.appendChild(az);body.appendChild(bank);
}

function hRes(ok,q){score+=ok?1:0;ans.push(ok);showFB(ok,q.ex);}

function showFB(ok,ex){
  document.getElementById('fb-bar').style.background=ok?'var(--green)':'var(--red)';
  document.getElementById('fb-icon').textContent=ok?'🎉':'💪';
  document.getElementById('fb-title').textContent=ok?'Тамаша! Дұрыс!':'Жалғастыр!';
  document.getElementById('fb-title').style.color=ok?'var(--green2)':'var(--red2)';
  document.getElementById('fb-body').textContent=ex;
  document.getElementById('fb-overlay').classList.add('show');
  if(ok&&idx%4===3)spConf();
}

function closeFeedback(){
  document.getElementById('fb-overlay').classList.remove('show');
  idx++;
  if(idx<Q.length)loadQ();else finish();
}

function finish(){
  showScreen('result');sDone();
  var level,tag,emoji,desc,bg,color,info;
  if(score<=4){
    level='Beginner';tag='A1 – Beginner';emoji='🌱';bg='#fff7ed';color='#ea580c';
    desc='Ағылшын тілін жаңадан бастадыңыз — бұл тамаша бастама!';
    info=[
      '🔤 Ағылшын алфавиті мен дыбыстары',
      '💬 Өзімді таныстыру: My name is...',
      '🔢 Сандар, түстер, күндер',
      '📝 To be етістігі: am / is / are',
      '🏠 Тұрмыстық сөздік қор (үй, тамақ, отбасы)',
      '⏰ Present Simple — күнделікті әрекеттер'
    ];
  } else if(score<=8){
    level='Elementary';tag='A2 – Elementary';emoji='📖';bg='#eff6ff';color='#2563eb';
    desc='Негізді білесіз, грамматика мен сөздік қорды нығайту керек.';
    info=[
      '⏳ Past Simple — өткен шақ',
      '🔮 Future Simple — болашақ шақ',
      '❓ Сұраулы сөйлемдер: Do/Does/Did',
      '📖 A1 деңгейінде кітап оқу',
      '🗣️ Күнделікті диалогтар мен фразалар',
      '🔗 Жалғаулықтар: because, but, and, so'
    ];
  } else if(score<=12){
    level='Intermediate';tag='B1 – Intermediate';emoji='⚡';bg='#f0fdf4';color='#16a34a';
    desc='Жақсы деңгей! B2-ге жету үшін бағытталған жаттығу керек.';
    info=[
      '🔄 Present / Past Perfect шақтары',
      '🎯 Conditionals: If I were... / If I had...',
      '📰 Қысқа мақалалар мен хабарларды түсіну',
      '🎙️ Өз пікіріңізді білдіру: I think / In my opinion',
      '📚 Phrasal verbs: give up, look after, carry on',
      '✍️ Хат пен email жазу'
    ];
  } else {
    level='Upper-Intermediate';tag='B2 – Upper-Int.';emoji='🔥';bg='#f5f3ff';color='#7c3aed';
    desc='Керемет нәтиже! C1 деңгейіне жету үшін жұмыс жасайық.';
    info=[
      '🎓 Advanced grammar: inversion, subjunctive',
      '📖 Аутентикалық мәтіндер: BBC, The Guardian',
      '🗣️ Дебат және презентация дағдылары',
      '✍️ Академиялық және іскери жазу',
      '🎬 Субтитрсіз фильм түсіну',
      '🏆 IELTS / TOEFL дайындығы'
    ];
  }

  document.getElementById('res-emoji').textContent=emoji;
  var se=document.getElementById('res-score');se.textContent='0';
  var n=0,tm=setInterval(function(){n++;se.textContent=n;if(n>=score)clearInterval(tm);},80);
  var pill=document.getElementById('lvl-pill');pill.textContent=tag;pill.style.background=bg;pill.style.color=color;
  document.getElementById('lvl-name').textContent=level;
  document.getElementById('res-desc').textContent=desc;
  var infoEl=document.getElementById('res-info');
  infoEl.innerHTML='<div class="res-info-title">📋 Сіз үшін бағдарлама:</div>';
  info.forEach(function(item){
    var d=document.createElement('div');d.className='res-info-item';d.textContent=item;
    infoEl.appendChild(d);
  });
  var rc=document.getElementById('ring-circle');
  setTimeout(function(){rc.style.transition='stroke-dashoffset 1.5s ease';rc.style.strokeDashoffset=339-(339*(score/15));},300);
  var sk=document.getElementById('streak');sk.innerHTML='';
  ans.forEach(function(ok){var d=document.createElement('div');d.className='sdot'+(ok?' ok':' wr');sk.appendChild(d);});
  var msg=encodeURIComponent('Сәлеметсіз бе! Менің атым '+uName+'. Тест нәтижем: '+score+'/15 — '+tag+'. Тегін консультация алғым келеді! 🚀');
  document.getElementById('wa-link').href='https://wa.me/'+WA_NUMBER+'?text='+msg;

  /* Google Sheets: телефонды таза цифрмен жіберу — 77071234567 форматында */
  (function(){
    var rawPhone=uPhone.replace(/\D/g,'');
    if(rawPhone.length===11&&rawPhone[0]==='8') rawPhone='7'+rawPhone.slice(1);
    var t=new Date().toLocaleString('ru-RU');
    var u=GOOGLE_URL+'?name='+encodeURIComponent(uName)+'&phone='+encodeURIComponent(rawPhone)+'&score='+score+'&level='+encodeURIComponent(tag)+'&time='+encodeURIComponent(t);
    fetch(u,{method:'GET',mode:'no-cors'}).catch(function(){});
  })();

  if(score>=10)setTimeout(spConf,400);
  if(score>=13)setTimeout(spConf,1400);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('scr-'+id).classList.add('active');
}
function restartTest(){score=0;idx=0;hearts=3;ans=[];showScreen('reg');}

function spConf(){
  var c=document.getElementById('confetti');
  var cols=['#2563eb','#7c3aed','#16a34a','#f59e0b','#ec4899','#06b6d4','#ef4444'];
  for(var i=0;i<80;i++){
    var el=document.createElement('div');el.className='cp';
    var col=cols[Math.floor(Math.random()*cols.length)];
    var sz=6+Math.random()*10,dur=1.5+Math.random()*2;
    el.style.cssText='left:'+Math.random()*100+'%;top:-20px;background:'+col+';width:'+sz+'px;height:'+sz+'px;animation-duration:'+dur+'s;animation-delay:'+Math.random()*.8+'s;border-radius:'+(Math.random()>.5?'50%':'3px')+';';
    c.appendChild(el);setTimeout(function(){this.remove();}.bind(el),(dur+.8)*1000);
  }
}

function spPart(x,y,col){
  for(var i=0;i<8;i++){
    var el=document.createElement('div');el.className='particle';
    var a=i*45*Math.PI/180,d=40+Math.random()*30;
    el.style.cssText='left:'+x+'px;top:'+y+'px;width:8px;height:8px;background:'+col+';--tx:'+Math.cos(a)*d+'px;--ty:'+Math.sin(a)*d+'px;';
    document.body.appendChild(el);setTimeout(function(){this.remove();}.bind(el),700);
  }
}

document.getElementById('ring-circle').style.strokeDashoffset=339;
</script>
